<aside class="fixed left-0 top-0 w-64 h-screen bg-slate-900 text-white flex flex-col">
    <!-- Logo -->
    <div class="p-5 border-b border-slate-800">
        <h1 class="text-3xl font-bold text-blue-400">
            TaskFlow
        </h1>

        <p class="text-sm text-gray-400 mt-1">
            Admin Dashboard
        </p>
    </div>

    <!-- Menu -->
    <nav class="flex-1 p-5">
        <ul class="space-y-3">
            <li *ngFor="let item of sideBar">
                <a [routerLink]="item.link" routerLinkActive="active" class="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-800 transition">
                    <span>{{item.sidebarIcon}}</span>
                    <span>{{item.sideBarName}}</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Bottom -->
    <div class="p-5 border-t border-slate-800">
        <button class="w-full bg-blue-500 hover:bg-blue-600 transition py-3 rounded-lg font-semibold">
            Logout
        </button>
    </div>

</aside>
